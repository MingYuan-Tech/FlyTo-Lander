name: Reproducible Build Verification

# 每次 Release 後自動驗證：
#   1. 在乾淨的 runner 重新 clone 該 release 對應的 tag commit
#   2. 重新 build unsigned release APK（不需 keystore）
#   3. 與 release 提供的 unsigned APK SHA-256 比對
#   4. 不一致時自動開 GitHub issue
#
# Phase 1.6 起改為比對 unsigned APK：signed APK 的 APK Signing Block 因
# apksig 函式庫內部行為而 non-deterministic（apksigner 0.9 也無 RSA deterministic
# flag），是已知限制。Build content 本身（classes.dex / resources / ZIP entries
# 等）完全 deterministic，unsigned APK SHA 比對才是有效的 reproducibility 驗證。

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to verify (e.g. v1.0.0)'
        required: true

permissions:
  contents: read
  issues: write

jobs:
  verify:
    name: Rebuild and compare unsigned APK SHA-256
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.tag }}"
          else
            REF="${{ github.event.release.tag_name }}"
          fi
          echo "name=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout tagged commit (clean clone)
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.name }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        if: hashFiles('gradlew') != ''
        run: chmod +x ./gradlew

      - name: Lint (release variant)
        run: ./gradlew lintRelease --no-daemon --stacktrace

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-release-verify
          path: app/build/reports/lint-results-release.*
          if-no-files-found: ignore
          retention-days: 14

      # 不傳 -PRELEASE_STORE_FILE → build.gradle.kts 寬容設計產 unsigned APK，
      # 完全不需要 keystore / signing secrets。
      - name: Rebuild unsigned release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Compute rebuilt unsigned SHA-256
        id: rebuilt
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No unsigned APK produced under app/build/outputs/apk/release"
            exit 1
          fi
          SUM=$(sha256sum "$APK" | awk '{print $1}')
          echo "sha=$SUM" >> "$GITHUB_OUTPUT"
          echo "Rebuilt unsigned SHA-256: $SUM"

      - name: Download published unsigned SHA-256
        id: published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_NAME="flyto-lander-${{ steps.tag.outputs.version }}-unsigned.apk.sha256"
          gh release download "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}" \
            --pattern "$ASSET_NAME" \
            --output published.sha256
          PUB_SHA=$(awk '{print $1}' published.sha256)
          echo "sha=$PUB_SHA" >> "$GITHUB_OUTPUT"
          echo "Published unsigned SHA-256: $PUB_SHA"

      - name: Compare unsigned hashes
        id: compare
        run: |
          if [ "${{ steps.rebuilt.outputs.sha }}" = "${{ steps.published.outputs.sha }}" ]; then
            echo "Reproducible build verification (unsigned APK) PASSED."
            echo "match=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Reproducible build verification: PASSED ✅"
              echo ""
              echo "Build content (unsigned APK) is reproducible."
              echo ""
              echo "- Tag: \`${{ steps.tag.outputs.name }}\`"
              echo "- Unsigned APK SHA-256: \`${{ steps.rebuilt.outputs.sha }}\`"
              echo ""
              echo "> Note: signed APK signing block is non-deterministic (apksig known limitation, not compared)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Reproducible build (unsigned) mismatch for ${{ steps.tag.outputs.name }}"
            echo "match=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Reproducible build verification: FAILED ❌"
              echo ""
              echo "- Tag: \`${{ steps.tag.outputs.name }}\`"
              echo "- Published unsigned: \`${{ steps.published.outputs.sha }}\`"
              echo "- Rebuilt unsigned:   \`${{ steps.rebuilt.outputs.sha }}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Open issue on mismatch
        if: failure() && steps.compare.outputs.match == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Reproducible build (unsigned) mismatch for ${{ steps.tag.outputs.name }}" \
            --label "security,reproducible-build" \
            --body "$(cat <<'EOF'
          Automated reproducible-build verification detected an **unsigned APK** SHA-256
          mismatch for the published release. Since the signing block is excluded from
          comparison, this indicates a real reproducibility problem in the build content:

          - Non-deterministic input in the build pipeline (timestamp, ordering,
            absolute paths, environment-dependent metadata)
          - Toolchain drift between release and verification builds (JDK / Gradle / AGP)
          - Tampering with the published artifact

          | Item | Value |
          |------|-------|
          | Tag | `${{ steps.tag.outputs.name }}` |
          | Published unsigned SHA-256 | `${{ steps.published.outputs.sha }}` |
          | Rebuilt unsigned SHA-256 | `${{ steps.rebuilt.outputs.sha }}` |
          | Verification run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

          Please investigate before publishing the next release.
          EOF
          )"
