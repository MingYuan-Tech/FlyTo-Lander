name: Release

# 觸發條件：推送 v* 形式的 git tag（例如 v1.0.0）
#
# 需在 repo Settings → Secrets and variables → Actions 設定以下 secrets：
#   - GPG_PRIVATE_KEY     : 工作室 GPG 私鑰（ASCII armored）
#   - GPG_PASSPHRASE      : 上述 GPG 私鑰的 passphrase
#   - KEYSTORE_BASE64     : Android release keystore（.jks）的 base64 編碼
#   - KEYSTORE_PASSWORD   : keystore 密碼
#   - KEY_ALIAS           : keystore 內的 key alias
#   - KEY_PASSWORD        : 上述 key 的密碼

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build a release for'
        required: true

env:
  # 2026-06-02 GHA runner 預設改 Node 24；強制所有 actions 跑 Node 24 環境
  # 直到 setup-gradle v5 / action-gh-release v3 等上游釋出 Node 24 版
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  actions: write  # 允許結尾 step 用 gh workflow run 主動 trigger reproducible-build.yml

jobs:
  release:
    name: Build, sign, and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # workflow_dispatch 觸發時 github.ref 是 default branch (main)；顯式用 input tag
          # 才能 checkout 對的 commit，否則 release 內 embed 的 git revision 與
          # reproducible-build.yml（永遠 checkout tag）不一致
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.tag }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi
          echo "name=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/release.keystore"
          echo "RELEASE_KEYSTORE=$RUNNER_TEMP/signing/release.keystore" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        if: hashFiles('gradlew') != ''
        run: chmod +x ./gradlew

      - name: Lint (release variant)
        run: ./gradlew lintRelease --no-daemon --stacktrace

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-release
          path: app/build/reports/lint-results-release.*
          if-no-files-found: ignore
          retention-days: 14

      # Phase 1.6: 先 build unsigned APK 作為 reproducible 比對標的。
      # APK Signing Block 因 apksig 8.x 內部行為而 non-deterministic（已知限制），
      # 但 build content（classes.dex / resources / textproto 等）完全 deterministic。
      # reproducible-build.yml 比對 unsigned APK SHA、不比 signed。
      - name: Build unsigned release APK (reproducible verification target)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate unsigned APK
        id: unsigned
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No unsigned APK produced"
            exit 1
          fi
          DEST="flyto-lander-${{ steps.tag.outputs.version }}-unsigned.apk"
          cp "$APK" "$DEST"
          SUM=$(sha256sum "$DEST" | awk '{print $1}')
          echo "$SUM  $DEST" > "$DEST.sha256"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "sha=$SUM" >> "$GITHUB_OUTPUT"
          echo "Unsigned APK SHA-256: $SUM"

      - name: Clean before signed build
        run: ./gradlew clean --no-daemon

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PRELEASE_STORE_FILE="$RELEASE_KEYSTORE" \
            -PRELEASE_STORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$KEY_PASSWORD"

      - name: Locate release APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced under app/build/outputs/apk/release"
            exit 1
          fi
          DEST="flyto-lander-${{ steps.tag.outputs.version }}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: sha
        run: |
          SUM=$(sha256sum "${{ steps.apk.outputs.path }}" | awk '{print $1}')
          echo "$SUM  ${{ steps.apk.outputs.path }}" > "${{ steps.apk.outputs.path }}.sha256"
          echo "sha=$SUM" >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is missing"
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: GPG-sign the APK
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --local-user "$GPG_KEY_ID" \
            --detach-sign --armor \
            --output "${{ steps.apk.outputs.path }}.asc" \
            "${{ steps.apk.outputs.path }}"

      - name: Collect build environment
        id: env
        run: |
          GRADLE_VERSION=$(./gradlew --version | awk '/^Gradle/ {print $2; exit}')
          AGP_VERSION=$(grep -RhoE 'com\.android\.tools\.build:gradle:[0-9.]+' . 2>/dev/null | head -n 1 | awk -F: '{print $3}')
          if [ -z "$AGP_VERSION" ]; then
            AGP_VERSION=$(grep -RhoE 'agp\s*=\s*"[0-9.]+"' . 2>/dev/null | head -n 1 | grep -oE '[0-9.]+')
          fi
          JDK_VERSION=$(java -version 2>&1 | head -n 1)
          {
            echo "gradle=$GRADLE_VERSION"
            echo "agp=${AGP_VERSION:-unknown}"
            echo "jdk=$JDK_VERSION"
            echo "commit=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        run: |
          cat > release-notes.md <<EOF
          ## FlyTo Lander ${{ steps.tag.outputs.name }}

          Android-side helper app for FlyTo (macOS GPS simulation tool).

          ### Verifying this release

          **Signed APK**（用於實際安裝）：

          - APK SHA-256: \`${{ steps.sha.outputs.sha }}\`
          - GPG signature: \`flyto-lander-${{ steps.tag.outputs.version }}.apk.asc\`
          - GPG key ID: \`${GPG_KEY_ID}\`

          \`\`\`bash
          shasum -a 256 flyto-lander-${{ steps.tag.outputs.version }}.apk
          gpg --verify flyto-lander-${{ steps.tag.outputs.version }}.apk.asc \\
                       flyto-lander-${{ steps.tag.outputs.version }}.apk
          \`\`\`

          **Unsigned APK**（用於 reproducible build 比對）：

          - Unsigned APK SHA-256: \`${{ steps.unsigned.outputs.sha }}\`
          - Asset name: \`flyto-lander-${{ steps.tag.outputs.version }}-unsigned.apk\`

          > ℹ️  Signed APK SHA-256 因 APK Signing Block 內 apksig 函式庫 non-deterministic
          > 行為而每次 build 不同（已知限制）。**Build content 本身（classes.dex、resources
          > 等）完全 deterministic**，reproducible 驗證請比對 unsigned APK SHA-256，CI 也只
          > 比對 unsigned。

          ### Build environment (for reproducible build verification)

          | Item | Value |
          |------|-------|
          | Git commit | \`${{ steps.env.outputs.commit }}\` |
          | Gradle | \`${{ steps.env.outputs.gradle }}\` |
          | Android Gradle Plugin (AGP) | \`${{ steps.env.outputs.agp }}\` |
          | JDK | \`${{ steps.env.outputs.jdk }}\` |
          | Runner OS | \`ubuntu-latest\` |

          To reproduce locally (unsigned APK):

          \`\`\`bash
          git clone https://github.com/MingYuan-Tech/FlyTo-Lander.git
          cd FlyTo-Lander
          git checkout ${{ steps.env.outputs.commit }}
          ./gradlew assembleRelease   # 不傳 -PRELEASE_STORE_FILE → unsigned APK
          shasum -a 256 app/build/outputs/apk/release/app-release-unsigned.apk
          # 期望輸出： ${{ steps.unsigned.outputs.sha }}
          \`\`\`

          上面 SHA-256 應與 release 提供的 unsigned APK 完全一致。CI 自動驗證見
          \`.github/workflows/reproducible-build.yml\`。

          ---

          See [README](https://github.com/MingYuan-Tech/FlyTo-Lander/blob/main/README.md)
          for installation, usage, and risk disclosure.
          EOF
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: FlyTo Lander ${{ steps.tag.outputs.name }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.path }}.sha256
            ${{ steps.apk.outputs.path }}.asc
            ${{ steps.unsigned.outputs.path }}
            ${{ steps.unsigned.outputs.path }}.sha256

      # GitHub 防 infinite loop 設計禁止 github.token 觸發的 release.published 事件
      # cascade trigger 其他 workflow。改用主動 dispatch（workflow_dispatch 不受該限制）。
      - name: Trigger reproducible build verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run reproducible-build.yml \
            -f tag=${{ steps.tag.outputs.name }}
